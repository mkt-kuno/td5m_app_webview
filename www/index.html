<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDS530 TCP Logger</title>
    <script src="tailwind.min.js"></script>
    <script src="chart.min.js"></script>
    <style>
        .val-shadow { text-shadow: 0 0 4px rgba(255,255,255,0.8), 0 0 4px rgba(255,255,255,0.8), 0 0 4px rgba(255,255,255,0.8); }
        .raw-value::after { content: 'με'; font-size: 0.7em; margin-left: 1px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen px-4 py-3">
    <div class="max-w-[1900px] mx-auto h-[calc(100vh-1.5rem)] flex flex-col">
        <!-- Header Bar -->
        <div class="bg-white rounded-lg shadow-md px-6 py-3 mb-3 flex items-center gap-6 flex-wrap shrink-0">
            <h1 class="text-3xl font-bold text-gray-800 whitespace-nowrap">TDS530 Data Monitor</h1>
            <div class="flex items-center gap-2">
                <span class="text-base text-gray-500">Last Update:</span>
                <span id="timestamp" class="text-xl font-semibold text-gray-800">--</span>
            </div>
            <span id="status" class="inline-flex items-center px-3 py-1 rounded-full text-base font-medium bg-gray-200 text-gray-800">
                <span class="w-2.5 h-2.5 mr-2 rounded-full bg-gray-400"></span>
                Connecting...
            </span>
            <div class="flex items-center gap-3 ml-auto">
                <button id="startSaveBtn" class="px-4 py-2 rounded-md bg-blue-600 text-white text-base hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed">Start Save</button>
                <button id="stopSaveBtn" class="px-4 py-2 rounded-md bg-gray-600 text-white text-base hover:bg-gray-700 disabled:opacity-50 disabled:cursor-not-allowed" disabled>Stop Save</button>
                <span id="saveStatus" class="text-base text-gray-600">Not Saving</span>
            </div>
        </div>

        <!-- Blocks Container -->
        <div id="blocksContainer" class="flex-1 grid grid-cols-5 gap-3 items-start content-start overflow-auto min-h-0">
            <!-- Blocks will be inserted here dynamically -->
        </div>

        <!-- Calibration editor card -->
        <div id="lowerContainer" class="mt-3 bg-white rounded-lg shadow-md p-4 flex flex-col">
            <div id="calibSummary" class="text-sm text-gray-700">
                <!-- Calibration inputs will be inserted here -->
            </div>
            <div class="mt-1 flex items-center justify-end">
                <span id="calibStatus" class="text-sm text-gray-600"></span>
            </div>
        </div>
    </div>

    <script>
        const blocksContainer = document.getElementById('blocksContainer');
        const lowerContainer = document.getElementById('lowerContainer');
        const calibSummary = document.getElementById('calibSummary');
        const timestampEl = document.getElementById('timestamp');
        const statusEl = document.getElementById('status');
        const startSaveBtn = document.getElementById('startSaveBtn');
        const stopSaveBtn = document.getElementById('stopSaveBtn');
        const saveStatusEl = document.getElementById('saveStatus');
        const calibStatus = document.getElementById('calibStatus');

        const CALIB_GROUPS = ['Z', 'X', 'Disp', 'AUX0', 'AUX1', 'AUX2', 'AUX3', 'AUX4'];

        // Fetch/sync state
        let lastTime = null;
        let isFetching = false;
        let isSaving = false;
        let wasConnected = false;

        // Chart state
        const FIFO_SIZE = 64;
        const CHART_BLUE   = 'rgba(37, 99, 235, 0.35)';
        const CHART_ORANGE = 'rgba(234, 88, 12, 0.35)';
        let channelCharts = {};
        let channelCount  = 0;
        let tickCounter   = 0;

        const GRBL_AXES = ['X', 'Y', 'Z', 'A', 'B'];

        function chartColorForValue(value) {
            return value >= 0 ? CHART_BLUE : CHART_ORANGE;
        }

        function textColorForValue(value) {
            return value < 0 ? '#ea580c' : '#2563eb';
        }

        function updateStatus(isConnected, message = '') {
            if (!isConnected && wasConnected) {
                resetCharts();
            }
            wasConnected = isConnected;
            if (isConnected) {
                statusEl.innerHTML = `
                    <span class="w-2 h-2 mr-2 rounded-full bg-green-500 animate-pulse"></span>
                    Connected
                `;
                statusEl.className = 'inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-green-100 text-green-800';
            } else {
                statusEl.innerHTML = `
                    <span class="w-2 h-2 mr-2 rounded-full bg-red-500"></span>
                    ${message || 'Disconnected'}
                `;
                statusEl.className = 'inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-red-100 text-red-800';
            }
        }

        function formatChannelLabel(index) {
            return `CH${String(index).padStart(2, '0')}`;
        }

        function formatValue(value, maxTotalLen = 8) {
            if (value === null || value === undefined || value === 'None') {
                return 'None';
            }
            const sign = value >= 0 ? '+' : '-';
            const absVal = Math.abs(value);
            const intStr = Math.floor(absVal).toString();
            const maxNumLen = maxTotalLen - 1; // reserve 1 for sign
            if (intStr.length >= maxNumLen) {
                return sign + intStr.substring(0, maxNumLen);
            }
            const fracDigits = maxNumLen - intStr.length - 1; // -1 for '.'
            if (fracDigits <= 0) {
                return sign + intStr;
            }
            let formatted = absVal.toFixed(fracDigits);
            if (formatted.length > maxNumLen) {
                formatted = formatted.substring(0, maxNumLen);
                if (formatted.endsWith('.')) {
                    formatted = formatted.slice(0, -1);
                }
            }
            return sign + formatted;
        }

        function initChart(canvas) {
            return new Chart(canvas.getContext('2d'), {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        borderColor: CHART_BLUE,
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: false,
                        tension: 0.2,
                        spanGaps: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    plugins: {
                        legend:  { display: false },
                        tooltip: { enabled: false }
                    },
                    scales: {
                        x: { display: false },
                        y: {
                            display: true,
                            ticks:  { display: false },
                            border: { display: false },
                            afterDataLimits(scale) {
                                const dataRange = (scale.max - scale.min) || 1;
                                scale.max = Math.max(scale.max, 0);
                                scale.min = Math.min(scale.min, 0);
                                scale.max += dataRange * 0.05;
                                scale.min -= dataRange * 0.05;
                            },
                            grid: {
                                display: true,
                                color: function(context) {
                                    return context.tick.value === 0 ? 'rgba(0,0,0,0.2)' : 'rgba(0,0,0,0.03)';
                                }
                            }
                        }
                    }
                }
            });
        }

        function createChannelCell(ch, labelText, rawSizeClass, phySizeClass, borderColorClass, bgColorClass, extraClasses = '', compact = false, labelSizeClass = 'text-xs', colorMode = 'sign') {
            const cell = document.createElement('div');
            cell.className = `relative overflow-hidden rounded border ${borderColorClass} ${bgColorClass} ${extraClasses}`;

            const canvas = document.createElement('canvas');
            canvas.style.cssText = 'position:absolute;inset:0;pointer-events:none;';
            cell.appendChild(canvas);

            const content = document.createElement('div');
            content.className = 'relative z-10 px-1.5 py-1 h-full flex flex-col justify-between pointer-events-none select-none';
            content.innerHTML = `
                <div class="${labelSizeClass} font-semibold text-gray-500 leading-tight">${labelText}</div>
                <div class="flex flex-col items-end leading-none">
                    <div id="val-raw-${ch}" class="val-shadow raw-value ${rawSizeClass} font-bold font-mono text-right" style="color:rgba(0,0,0,0.05)">None</div>
                    <div id="val-phy-${ch}" class="val-shadow ${phySizeClass} font-bold font-mono text-right" style="color:rgba(0,0,0,0.05)">None</div>
                </div>
            `;
            cell.appendChild(content);

            // Store formatter and color mode preference on the value elements
            const rawEl = content.querySelector(`#val-raw-${ch}`);
            const phyEl = content.querySelector(`#val-phy-${ch}`);
            if (rawEl) {
                rawEl.dataset.compact = compact ? '1' : '0';
                rawEl.dataset.colorMode = colorMode;
            }
            if (phyEl) {
                phyEl.dataset.compact = compact ? '1' : '0';
                phyEl.dataset.colorMode = colorMode;
            }

            try {
                const chart = initChart(canvas);
                chart._colorMode = colorMode;
                channelCharts[ch] = chart;
            } catch (e) {
                console.error(`[createChannelCell] Chart init error for CH${ch}:`, e);
            }

            return cell;
        }

        function createBlock(blockIndex, totalChannels) {
            const baseCh = blockIndex * 10;
            const axis = GRBL_AXES[blockIndex] || '';
            const startCh = baseCh;
            const endCh = Math.min(baseCh + 9, totalChannels - 1);

            const block = document.createElement('div');
            block.className = 'bg-white rounded-lg shadow-md p-2 flex flex-col min-h-0';

            // Header
            const header = document.createElement('div');
            header.className = 'flex items-center justify-between mb-2 shrink-0';
            header.innerHTML = `
                <div class="text-lg font-bold text-gray-700">Block ${blockIndex} <span class="text-sm text-gray-500">/ ${axis} Axis</span></div>
                <div class="text-sm text-gray-400">${formatChannelLabel(startCh)}-${formatChannelLabel(endCh)}</div>
            `;
            block.appendChild(header);

            // Body grid: loadcell area and displacement below
            const body = document.createElement('div');
            body.className = 'grid grid-rows-[auto_auto] gap-2';

            // Load cell area (4x2 grid)
            const loadcellArea = document.createElement('div');
            loadcellArea.className = 'grid grid-cols-4 grid-rows-2 gap-1';

            // Top row: Z directions
            for (let col = 0; col < 4; col++) {
                const ch = baseCh + col * 2; // 0,2,4,6
                if (ch <= endCh) {
                    loadcellArea.appendChild(createChannelCell(ch, `${formatChannelLabel(ch)} Z`, 'text-sm', 'text-base', 'border-blue-200', 'bg-blue-50/50', 'h-48', true, 'text-xs', 'blue'));
                }
            }
            // Bottom row: X directions
            for (let col = 0; col < 4; col++) {
                const ch = baseCh + col * 2 + 1; // 1,3,5,7
                if (ch <= endCh) {
                    loadcellArea.appendChild(createChannelCell(ch, `${formatChannelLabel(ch)} X`, 'text-sm', 'text-base', 'border-orange-200', 'bg-orange-50/50', 'h-48', true, 'text-xs', 'orange'));
                }
            }

            body.appendChild(loadcellArea);

            // Bottom row: Displacement + AUX side by side
            const bottomRow = document.createElement('div');
            bottomRow.className = 'grid grid-cols-[3fr_1fr] gap-2';

            const dispCh = baseCh + 8;
            if (dispCh <= endCh) {
                const dispCell = createChannelCell(dispCh, `Disp ${formatChannelLabel(dispCh)}`, 'text-2xl', 'text-3xl', 'border-green-200', 'bg-green-50/50', 'h-48', false, 'text-base', 'green');
                bottomRow.appendChild(dispCell);
            }

            const auxCh = baseCh + 9;
            if (auxCh <= endCh) {
                const auxCell = createChannelCell(auxCh, `AUX ${formatChannelLabel(auxCh)}`, 'text-sm', 'text-base', 'border-purple-200', 'bg-purple-50/50', 'h-48', true, 'text-sm', 'purple');
                bottomRow.appendChild(auxCell);
            }

            body.appendChild(bottomRow);

            block.appendChild(body);
            return block;
        }

        function createBlocks(count) {
            // Destroy existing charts
            Object.values(channelCharts).forEach(c => c.destroy());
            channelCharts = {};
            blocksContainer.innerHTML = '';
            channelCount = count;
            tickCounter  = 0;

            const blockCount = Math.ceil(count / 10);
            for (let b = 0; b < blockCount; b++) {
                blocksContainer.appendChild(createBlock(b, count));
            }
        }

        function updateValueElement(el, value) {
            if (!el) return;
            const isNull = value === null || value === undefined || value === 'None';
            const colorMode = el.dataset.colorMode || 'sign';
            if (isNull) {
                el.style.color = 'rgba(0,0,0,0.05)';
                el.textContent = 'None';
                return;
            }
            let color;
            if (colorMode === 'green') {
                color = '#16a34a';
            } else if (colorMode === 'purple') {
                color = '#9333ea';
            } else if (colorMode === 'blue') {
                color = '#2563eb';
            } else if (colorMode === 'orange') {
                color = '#ea580c';
            } else {
                color = textColorForValue(value);
            }
            el.style.color = color;
            const maxLen = el.dataset.compact === '1' ? 6 : 8;
            el.textContent = formatValue(value, maxLen);
        }

        function updateChannels(rawData, physicalData) {
            tickCounter++;
            for (let i = 0; i < rawData.length; i++) {
                const rawValue = rawData[i];
                const phyValue = physicalData[i];
                const isNull = rawValue === null || rawValue === undefined || rawValue === 'None';

                updateValueElement(document.getElementById(`val-raw-${i}`), rawValue);
                updateValueElement(document.getElementById(`val-phy-${i}`), phyValue);

                // Chart is based on raw values
                if (!isNull) {
                    const chart = channelCharts[i];
                    if (chart) {
                        const labels  = chart.data.labels;
                        const dataset = chart.data.datasets[0];
                        labels.push(tickCounter);
                        dataset.data.push(rawValue);
                        if (labels.length > FIFO_SIZE) {
                            labels.shift();
                            dataset.data.shift();
                        }
                        const chartMode = chart._colorMode || 'sign';
                        if (chartMode === 'green') {
                            dataset.borderColor = 'rgba(22, 163, 74, 0.5)';
                        } else if (chartMode === 'purple') {
                            dataset.borderColor = 'rgba(147, 51, 234, 0.5)';
                        } else if (chartMode === 'blue') {
                            dataset.borderColor = 'rgba(37, 99, 235, 0.5)';
                        } else if (chartMode === 'orange') {
                            dataset.borderColor = 'rgba(234, 88, 12, 0.5)';
                        } else {
                            dataset.borderColor = chartColorForValue(rawValue);
                        }
                        chart.update('none');
                    }
                }
            }
        }

        function resetCharts() {
            tickCounter = 0;
            for (let i = 0; i < channelCount; i++) {
                const chart = channelCharts[i];
                if (chart) {
                    chart.data.labels = [];
                    chart.data.datasets[0].data        = [];
                    chart.data.datasets[0].borderColor = CHART_BLUE;
                    chart.update('none');
                }
                updateValueElement(document.getElementById(`val-raw-${i}`), null);
                updateValueElement(document.getElementById(`val-phy-${i}`), null);
            }
        }

        function renderData(rawData, physicalData, time) {
            timestampEl.textContent = time;

            if (rawData.length !== channelCount) {
                createBlocks(rawData.length);
            }

            updateChannels(rawData, physicalData);
        }

        async function fetchData() {
            if (isFetching) return;
            isFetching = true;
            try {
                const jsonData = await pywebview.api.get_latest_data();

                if (jsonData.error) {
                    updateStatus(false, jsonData.error);
                    return;
                }

                if (jsonData.raw && jsonData.physical && jsonData.time) {
                    if (jsonData.time !== lastTime) {
                        lastTime = jsonData.time;
                        renderData(jsonData.raw, jsonData.physical, jsonData.time);
                    }
                    updateStatus(true);

                    if (isSaving) {
                        saveStatusEl.textContent = `Saving: ${jsonData.raw.length}ch / Latest ${jsonData.time}`;
                    }
                } else {
                    updateStatus(false, 'Invalid data format');
                }
            } catch (error) {
                console.error('[fetchData] error:', error);
                updateStatus(false, 'Error: ' + error.message);
            } finally {
                isFetching = false;
            }
        }

        async function startSaving() {
            if (isSaving) return;

            startSaveBtn.disabled = true;
            saveStatusEl.textContent = 'Select save location...';

            try {
                const result = await pywebview.api.select_save_file();

                if (result.cancelled) {
                    startSaveBtn.disabled = false;
                    saveStatusEl.textContent = 'Not Saving';
                    return;
                }

                const saveResult = await pywebview.api.start_saving(result.filepath);

                if (saveResult.error) {
                    startSaveBtn.disabled = false;
                    saveStatusEl.textContent = 'Error: ' + saveResult.error;
                    return;
                }

                isSaving = true;
                startSaveBtn.disabled = true;
                stopSaveBtn.disabled = false;
                saveStatusEl.textContent = 'Saving (TSV)';

            } catch (e) {
                console.error('[startSaving] error:', e);
                startSaveBtn.disabled = false;
                saveStatusEl.textContent = 'Not Saving';
            }
        }

        async function stopSaving() {
            if (!isSaving) return;

            try {
                await pywebview.api.stop_saving();
                isSaving = false;
                startSaveBtn.disabled = false;
                stopSaveBtn.disabled = true;
                saveStatusEl.textContent = 'Save complete (TSV)';
            } catch (e) {
                console.error('[stopSaving] error:', e);
                saveStatusEl.textContent = 'Save error';
            }
        }

        // Calibration editor
        function createCalibGroup(key, displayName, values) {
            const coeffs = values[key] || { a: 0, b: 1, c: 0 };
            const item = document.createElement('div');
            item.className = 'flex items-end gap-2';
            item.innerHTML = `
                <div class="font-semibold text-gray-700 text-base pb-1 w-24 shrink-0">${displayName}</div>
                <div class="grid grid-cols-3 gap-1 flex-1">
                    <div>
                        <label class="block text-xs text-gray-500">a</label>
                        <input type="number" step="any" id="calib-${key}-a" value="${coeffs.a}" class="w-full border border-gray-300 rounded px-2 py-1 text-base">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500">b</label>
                        <input type="number" step="any" id="calib-${key}-b" value="${coeffs.b}" class="w-full border border-gray-300 rounded px-2 py-1 text-base">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500">c</label>
                        <input type="number" step="any" id="calib-${key}-c" value="${coeffs.c}" class="w-full border border-gray-300 rounded px-2 py-1 text-base">
                    </div>
                </div>
            `;
            return item;
        }

        function renderCalibEditor(values) {
            calibSummary.innerHTML = '';
            const grid = document.createElement('div');
            grid.className = 'grid grid-cols-5 gap-x-4 gap-y-2';

            const groupLabels = {
                Z: 'Z', X: 'X', Disp: 'Displacement',
                AUX0: 'AUX0', AUX1: 'AUX1', AUX2: 'AUX2', AUX3: 'AUX3', AUX4: 'AUX4'
            };

            // Row 1: title, Z, X, Displacement, formula+export
            const titleItem = document.createElement('div');
            titleItem.className = 'flex items-center';
            titleItem.innerHTML = '<div class="text-lg font-bold text-gray-800">Calibration</div>';
            grid.appendChild(titleItem);

            ['Z', 'X', 'Disp'].forEach(key => {
                grid.appendChild(createCalibGroup(key, groupLabels[key], values));
            });

            const formulaItem = document.createElement('div');
            formulaItem.className = 'flex items-center justify-end gap-3';
            formulaItem.innerHTML = `
                <div class="text-sm text-gray-500">Phy = a×με² + b×με + c</div>
                <button id="saveCalibBtn" class="px-3 py-1 rounded-md bg-indigo-600 text-white text-sm hover:bg-indigo-700">Export</button>
            `;
            grid.appendChild(formulaItem);

            // Row 2: AUX0..AUX4
            ['AUX0', 'AUX1', 'AUX2', 'AUX3', 'AUX4'].forEach(key => {
                grid.appendChild(createCalibGroup(key, groupLabels[key], values));
            });

            calibSummary.appendChild(grid);
        }

        function attachCalibListeners() {
            const btn = document.getElementById('saveCalibBtn');
            if (btn) {
                btn.addEventListener('click', () => { saveCalibration({ silent: false }); });
            }
            CALIB_GROUPS.forEach(key => {
                ['a', 'b', 'c'].forEach(coef => {
                    const input = document.getElementById(`calib-${key}-${coef}`);
                    if (input) {
                        input.addEventListener('input', () => { autoSaveCalibration(); });
                    }
                });
            });
        }

        function debounce(fn, wait) {
            let timer = null;
            return function(...args) {
                clearTimeout(timer);
                timer = setTimeout(() => fn.apply(this, args), wait);
            };
        }

        const autoSaveCalibration = debounce(() => saveCalibration({ silent: true }), 500);

        async function saveCalibration({ silent = false } = {}) {
            const values = {};
            CALIB_GROUPS.forEach(key => {
                values[key] = {
                    a: parseFloat(document.getElementById(`calib-${key}-a`).value) || 0,
                    b: parseFloat(document.getElementById(`calib-${key}-b`).value) || 0,
                    c: parseFloat(document.getElementById(`calib-${key}-c`).value) || 0,
                };
            });
            try {
                const result = await pywebview.api.set_calibration(values);
                if (result.error) {
                    calibStatus.textContent = 'Save error: ' + result.error;
                } else {
                    calibStatus.textContent = silent ? 'Auto-saved' : 'Exported';
                    if (!silent) {
                        renderCalibEditor(values);
                        attachCalibListeners();
                    }
                }
            } catch (e) {
                console.error('[saveCalibration] error:', e);
                calibStatus.textContent = 'Save error';
            }
        }

        async function loadCalibration() {
            try {
                const values = await pywebview.api.get_calibration();
                renderCalibEditor(values);
                attachCalibListeners();
            } catch (e) {
                console.error('[loadCalibration] error:', e);
                calibStatus.textContent = 'Load error';
            }
        }

        window.addEventListener('pywebviewready', function() {
            if (typeof pywebview === 'undefined' || typeof pywebview.api === 'undefined') {
                console.error('pywebview API is not available');
                updateStatus(false, 'API not available');
                return;
            }

            console.log('pywebview API is ready');

            startSaveBtn.addEventListener('click', () => { startSaving(); });
            stopSaveBtn.addEventListener('click', () => { stopSaving(); });
            attachCalibListeners();

            loadCalibration();
            fetchData();
            setInterval(fetchData, 500);
        });
    </script>
</body>
</html>
