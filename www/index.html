<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDS530 TCP Logger</title>
    <script src="tailwind.min.js"></script>
    <script src="chart.min.js"></script>
    <style>
        .val-shadow { text-shadow: 0 0 4px rgba(255,255,255,0.8), 0 0 4px rgba(255,255,255,0.8), 0 0 4px rgba(255,255,255,0.8); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen px-4 py-3">
    <div class="max-w-[1900px] mx-auto h-[calc(100vh-1.5rem)] flex flex-col">
        <!-- Header Bar -->
        <div class="bg-white rounded-lg shadow-md px-6 py-3 mb-3 flex items-center gap-6 flex-wrap shrink-0">
            <h1 class="text-2xl font-bold text-gray-800 whitespace-nowrap">TDS530 Data Monitor</h1>
            <div class="flex items-center gap-2">
                <span class="text-sm text-gray-500">Last Update:</span>
                <span id="timestamp" class="text-lg font-semibold text-gray-800">--</span>
            </div>
            <span id="status" class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-gray-200 text-gray-800">
                <span class="w-2 h-2 mr-2 rounded-full bg-gray-400"></span>
                Connecting...
            </span>
            <div class="flex items-center gap-3 ml-auto">
                <button id="calibBtn" class="px-4 py-2 rounded-md bg-indigo-600 text-white hover:bg-indigo-700">Calibration</button>
                <button id="startSaveBtn" class="px-4 py-2 rounded-md bg-blue-600 text-white hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed">保存開始</button>
                <button id="stopSaveBtn" class="px-4 py-2 rounded-md bg-gray-600 text-white hover:bg-gray-700 disabled:opacity-50 disabled:cursor-not-allowed" disabled>保存終了</button>
                <span id="saveStatus" class="text-sm text-gray-600">未保存</span>
            </div>
        </div>

        <!-- Blocks Container -->
        <div id="blocksContainer" class="flex-1 grid grid-cols-5 gap-3 items-start content-start overflow-auto min-h-0">
            <!-- Blocks will be inserted here dynamically -->
        </div>

        <!-- Calibration summary card -->
        <div id="lowerContainer" class="mt-3 bg-white rounded-lg shadow-md p-3 flex flex-col">
            <div class="flex items-center justify-between mb-2">
                <div class="text-sm font-bold text-gray-700">Calibration</div>
                <button id="editCalibBtn" class="px-3 py-1 rounded-md bg-indigo-600 text-white text-xs hover:bg-indigo-700">編集</button>
            </div>
            <div id="calibSummary" class="text-xs text-gray-600">
                <!-- Calibration summary will be inserted here -->
            </div>
        </div>
    </div>

    <!-- Calibration Modal -->
    <div id="calibModal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl w-[720px] max-w-[95vw] max-h-[90vh] flex flex-col">
            <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
                <h2 class="text-xl font-bold text-gray-800">Calibration</h2>
                <button id="closeCalibBtn" class="text-gray-500 hover:text-gray-700 text-2xl leading-none">&times;</button>
            </div>
            <div class="p-6 overflow-auto">
                <p class="text-sm text-gray-600 mb-4">物理値 = a &times; Raw<sup>2</sup> + b &times; Raw + c</p>
                <div id="calibForm" class="space-y-3">
                    <!-- Calibration rows will be inserted here -->
                </div>
            </div>
            <div class="px-6 py-4 border-t border-gray-200 flex items-center justify-end gap-3">
                <span id="calibStatus" class="text-sm text-gray-600"></span>
                <button id="saveCalibBtn" class="px-4 py-2 rounded-md bg-indigo-600 text-white hover:bg-indigo-700">保存</button>
            </div>
        </div>
    </div>

    <script>
        const blocksContainer = document.getElementById('blocksContainer');
        const calibSummary = document.getElementById('calibSummary');
        const editCalibBtn = document.getElementById('editCalibBtn');
        const timestampEl = document.getElementById('timestamp');
        const statusEl = document.getElementById('status');
        const startSaveBtn = document.getElementById('startSaveBtn');
        const stopSaveBtn = document.getElementById('stopSaveBtn');
        const saveStatusEl = document.getElementById('saveStatus');
        const calibBtn = document.getElementById('calibBtn');
        const calibModal = document.getElementById('calibModal');
        const closeCalibBtn = document.getElementById('closeCalibBtn');
        const saveCalibBtn = document.getElementById('saveCalibBtn');
        const calibForm = document.getElementById('calibForm');
        const calibStatus = document.getElementById('calibStatus');

        const CALIB_GROUPS = ['Z', 'X', 'Disp', 'AUX0', 'AUX1', 'AUX2', 'AUX3', 'AUX4'];

        // Fetch/sync state
        let lastTime = null;
        let isFetching = false;
        let isSaving = false;
        let wasConnected = false;

        // Chart state
        const FIFO_SIZE = 64;
        const CHART_BLUE   = 'rgba(37, 99, 235, 0.35)';
        const CHART_ORANGE = 'rgba(234, 88, 12, 0.35)';
        let channelCharts = {};
        let channelCount  = 0;
        let tickCounter   = 0;

        const GRBL_AXES = ['X', 'Y', 'Z', 'A', 'B'];

        function chartColorForValue(value) {
            return value >= 0 ? CHART_BLUE : CHART_ORANGE;
        }

        function textColorForValue(value) {
            return value < 0 ? '#ea580c' : '#2563eb';
        }

        function updateStatus(isConnected, message = '') {
            if (!isConnected && wasConnected) {
                resetCharts();
            }
            wasConnected = isConnected;
            if (isConnected) {
                statusEl.innerHTML = `
                    <span class="w-2 h-2 mr-2 rounded-full bg-green-500 animate-pulse"></span>
                    Connected
                `;
                statusEl.className = 'inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-green-100 text-green-800';
            } else {
                statusEl.innerHTML = `
                    <span class="w-2 h-2 mr-2 rounded-full bg-red-500"></span>
                    ${message || 'Disconnected'}
                `;
                statusEl.className = 'inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-red-100 text-red-800';
            }
        }

        function formatChannelLabel(index) {
            return `CH${String(index).padStart(3, '0')}`;
        }

        function formatValue(value, maxTotalLen = 8) {
            if (value === null || value === undefined || value === 'None') {
                return 'None';
            }
            const sign = value >= 0 ? '+' : '-';
            const absVal = Math.abs(value);
            const intStr = Math.floor(absVal).toString();
            const maxNumLen = maxTotalLen - 1; // reserve 1 for sign
            if (intStr.length >= maxNumLen) {
                return sign + intStr.substring(0, maxNumLen);
            }
            const fracDigits = maxNumLen - intStr.length - 1; // -1 for '.'
            if (fracDigits <= 0) {
                return sign + intStr;
            }
            let formatted = absVal.toFixed(fracDigits);
            if (formatted.length > maxNumLen) {
                formatted = formatted.substring(0, maxNumLen);
                if (formatted.endsWith('.')) {
                    formatted = formatted.slice(0, -1);
                }
            }
            return sign + formatted;
        }

        function initChart(canvas) {
            return new Chart(canvas.getContext('2d'), {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        borderColor: CHART_BLUE,
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: false,
                        tension: 0.2,
                        spanGaps: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    plugins: {
                        legend:  { display: false },
                        tooltip: { enabled: false }
                    },
                    scales: {
                        x: { display: false },
                        y: {
                            display: true,
                            ticks:  { display: false },
                            border: { display: false },
                            afterDataLimits(scale) {
                                const dataRange = (scale.max - scale.min) || 1;
                                scale.max = Math.max(scale.max, 0);
                                scale.min = Math.min(scale.min, 0);
                                scale.max += dataRange * 0.05;
                                scale.min -= dataRange * 0.05;
                            },
                            grid: {
                                display: true,
                                color: function(context) {
                                    return context.tick.value === 0 ? 'rgba(0,0,0,0.2)' : 'rgba(0,0,0,0.03)';
                                }
                            }
                        }
                    }
                }
            });
        }

        function createChannelCell(ch, labelText, valueSizeClass, borderColorClass, bgColorClass, extraClasses = '', compact = false) {
            const cell = document.createElement('div');
            cell.className = `relative overflow-hidden rounded border ${borderColorClass} ${bgColorClass} ${extraClasses}`;

            const canvas = document.createElement('canvas');
            canvas.style.cssText = 'position:absolute;inset:0;pointer-events:none;';
            cell.appendChild(canvas);

            const content = document.createElement('div');
            content.className = 'relative z-10 px-1 py-0.5 h-full flex flex-col justify-between pointer-events-none select-none';
            content.innerHTML = `
                <div class="text-[10px] font-semibold text-gray-500 leading-tight">${labelText}</div>
                <div id="val-${ch}" class="val-shadow ${valueSizeClass} font-bold font-mono leading-none text-right" style="color:rgba(0,0,0,0.05)">None</div>
            `;
            cell.appendChild(content);

            // Store formatter preference on the value element
            const valEl = content.querySelector(`#val-${ch}`);
            if (valEl) {
                valEl.dataset.compact = compact ? '1' : '0';
            }

            try {
                channelCharts[ch] = initChart(canvas);
            } catch (e) {
                console.error(`[createChannelCell] Chart init error for CH${ch}:`, e);
            }

            return cell;
        }

        function createBlock(blockIndex, totalChannels) {
            const baseCh = blockIndex * 10;
            const axis = GRBL_AXES[blockIndex] || '';
            const startCh = baseCh;
            const endCh = Math.min(baseCh + 9, totalChannels - 1);

            const block = document.createElement('div');
            block.className = 'bg-white rounded-lg shadow-md p-2 flex flex-col min-h-0';

            // Header
            const header = document.createElement('div');
            header.className = 'flex items-center justify-between mb-2 shrink-0';
            header.innerHTML = `
                <div class="font-bold text-gray-700">Block ${blockIndex} <span class="text-sm text-gray-500">(${axis}軸)</span></div>
                <div class="text-xs text-gray-400">${formatChannelLabel(startCh)}-${formatChannelLabel(endCh)}</div>
            `;
            block.appendChild(header);

            // Body grid: loadcell area and displacement below
            const body = document.createElement('div');
            body.className = 'grid grid-rows-[auto_auto] gap-2';

            // Load cell area (4x2 grid)
            const loadcellArea = document.createElement('div');
            loadcellArea.className = 'grid grid-cols-4 grid-rows-2 gap-1 bg-gray-50 rounded border border-gray-200 p-1';

            // Top row: Z directions
            for (let col = 0; col < 4; col++) {
                const ch = baseCh + col * 2; // 0,2,4,6
                if (ch <= endCh) {
                    loadcellArea.appendChild(createChannelCell(ch, `${formatChannelLabel(ch)} Z`, 'text-[10px]', 'border-blue-200', 'bg-blue-50/50', 'h-48', true));
                }
            }
            // Bottom row: X directions
            for (let col = 0; col < 4; col++) {
                const ch = baseCh + col * 2 + 1; // 1,3,5,7
                if (ch <= endCh) {
                    loadcellArea.appendChild(createChannelCell(ch, `${formatChannelLabel(ch)} X`, 'text-[10px]', 'border-orange-200', 'bg-orange-50/50', 'h-48', true));
                }
            }

            body.appendChild(loadcellArea);

            // Bottom row: Displacement + AUX side by side
            const bottomRow = document.createElement('div');
            bottomRow.className = 'grid grid-cols-[3fr_1fr] gap-2';

            const dispCh = baseCh + 8;
            if (dispCh <= endCh) {
                const dispCell = createChannelCell(dispCh, `変位 ${formatChannelLabel(dispCh)}`, 'text-2xl', 'border-green-200', 'bg-green-50/50', 'h-48');
                bottomRow.appendChild(dispCell);
            }

            const auxCh = baseCh + 9;
            if (auxCh <= endCh) {
                const auxCell = createChannelCell(auxCh, `AUX ${formatChannelLabel(auxCh)}`, 'text-sm', 'border-purple-200', 'bg-purple-50/50', 'h-48', true);
                bottomRow.appendChild(auxCell);
            }

            body.appendChild(bottomRow);

            block.appendChild(body);
            return block;
        }

        function createBlocks(count) {
            // Destroy existing charts
            Object.values(channelCharts).forEach(c => c.destroy());
            channelCharts = {};
            blocksContainer.innerHTML = '';
            channelCount = count;
            tickCounter  = 0;

            const blockCount = Math.ceil(count / 10);
            for (let b = 0; b < blockCount; b++) {
                blocksContainer.appendChild(createBlock(b, count));
            }
        }

        function updateChannels(data) {
            tickCounter++;
            for (let i = 0; i < data.length; i++) {
                const value  = data[i];
                const isNull = value === null || value === undefined || value === 'None';

                const valEl = document.getElementById(`val-${i}`);
                if (valEl) {
                    valEl.style.color = isNull ? 'rgba(0,0,0,0.05)' : textColorForValue(value);
                    const maxLen = valEl.dataset.compact === '1' ? 6 : 8;
                    valEl.textContent = formatValue(value, maxLen);
                }

                if (!isNull) {
                    const chart = channelCharts[i];
                    if (chart) {
                        const labels  = chart.data.labels;
                        const dataset = chart.data.datasets[0];
                        labels.push(tickCounter);
                        dataset.data.push(value);
                        if (labels.length > FIFO_SIZE) {
                            labels.shift();
                            dataset.data.shift();
                        }
                        dataset.borderColor = chartColorForValue(value);
                        chart.update('none');
                    }
                }
            }
        }

        function resetCharts() {
            tickCounter = 0;
            for (let i = 0; i < channelCount; i++) {
                const chart = channelCharts[i];
                if (chart) {
                    chart.data.labels = [];
                    chart.data.datasets[0].data        = [];
                    chart.data.datasets[0].borderColor = CHART_BLUE;
                    chart.update('none');
                }
                const valEl = document.getElementById(`val-${i}`);
                if (valEl) {
                    valEl.style.color = 'rgba(0,0,0,0.05)';
                    valEl.textContent = 'None';
                }
            }
        }

        function renderData(physicalData, time) {
            timestampEl.textContent = time;

            if (physicalData.length !== channelCount) {
                createBlocks(physicalData.length);
            }

            updateChannels(physicalData);
        }

        async function fetchData() {
            if (isFetching) return;
            isFetching = true;
            try {
                const jsonData = await pywebview.api.get_latest_data();

                if (jsonData.error) {
                    updateStatus(false, jsonData.error);
                    return;
                }

                if (jsonData.physical && jsonData.time) {
                    if (jsonData.time !== lastTime) {
                        lastTime = jsonData.time;
                        renderData(jsonData.physical, jsonData.time);
                    }
                    updateStatus(true);

                    if (isSaving) {
                        saveStatusEl.textContent = `保存中: ${jsonData.physical.length}ch / 最新 ${jsonData.time}`;
                    }
                } else {
                    updateStatus(false, 'Invalid data format');
                }
            } catch (error) {
                console.error('[fetchData] error:', error);
                updateStatus(false, 'Error: ' + error.message);
            } finally {
                isFetching = false;
            }
        }

        async function startSaving() {
            if (isSaving) return;

            startSaveBtn.disabled = true;
            saveStatusEl.textContent = '保存先を選択…';

            try {
                const result = await pywebview.api.select_save_file();

                if (result.cancelled) {
                    startSaveBtn.disabled = false;
                    saveStatusEl.textContent = '未保存';
                    return;
                }

                const saveResult = await pywebview.api.start_saving(result.filepath);

                if (saveResult.error) {
                    startSaveBtn.disabled = false;
                    saveStatusEl.textContent = 'エラー: ' + saveResult.error;
                    return;
                }

                isSaving = true;
                startSaveBtn.disabled = true;
                stopSaveBtn.disabled = false;
                saveStatusEl.textContent = '保存中（TSV）';

            } catch (e) {
                console.error('[startSaving] error:', e);
                startSaveBtn.disabled = false;
                saveStatusEl.textContent = '未保存';
            }
        }

        async function stopSaving() {
            if (!isSaving) return;

            try {
                await pywebview.api.stop_saving();
                isSaving = false;
                startSaveBtn.disabled = false;
                stopSaveBtn.disabled = true;
                saveStatusEl.textContent = '保存完了（TSV）';
            } catch (e) {
                console.error('[stopSaving] error:', e);
                saveStatusEl.textContent = '保存エラー';
            }
        }

        // Calibration panel
        function renderCalibForm(values) {
            calibForm.innerHTML = '';
            CALIB_GROUPS.forEach(key => {
                const coeffs = values[key] || { a: 0, b: 1, c: 0 };
                const row = document.createElement('div');
                row.className = 'grid grid-cols-[80px_1fr_1fr_1fr] gap-2 items-center';
                row.innerHTML = `
                    <div class="font-semibold text-gray-700">${key}</div>
                    <div>
                        <label class="block text-xs text-gray-500">a</label>
                        <input type="number" step="any" id="calib-${key}-a" value="${coeffs.a}" class="w-full border border-gray-300 rounded px-2 py-1 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500">b</label>
                        <input type="number" step="any" id="calib-${key}-b" value="${coeffs.b}" class="w-full border border-gray-300 rounded px-2 py-1 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500">c</label>
                        <input type="number" step="any" id="calib-${key}-c" value="${coeffs.c}" class="w-full border border-gray-300 rounded px-2 py-1 text-sm">
                    </div>
                `;
                calibForm.appendChild(row);
            });
        }

        function renderCalibSummary(values) {
            calibSummary.innerHTML = '';
            const grid = document.createElement('div');
            grid.className = 'grid grid-cols-4 gap-x-4 gap-y-2';
            CALIB_GROUPS.forEach(key => {
                const coeffs = values[key] || { a: 0, b: 1, c: 0 };
                const item = document.createElement('div');
                item.innerHTML = `
                    <div class="font-semibold text-gray-700">${key}</div>
                    <div class="text-[10px] text-gray-500">a=${coeffs.a} b=${coeffs.b} c=${coeffs.c}</div>
                `;
                grid.appendChild(item);
            });
            calibSummary.appendChild(grid);
        }

        async function openCalibModal() {
            calibStatus.textContent = '';
            calibModal.classList.remove('hidden');
            calibModal.classList.add('flex');
            try {
                const values = await pywebview.api.get_calibration();
                renderCalibForm(values);
            } catch (e) {
                console.error('[openCalibModal] error:', e);
                calibStatus.textContent = '読み込みエラー';
            }
        }

        function closeCalibModal() {
            calibModal.classList.add('hidden');
            calibModal.classList.remove('flex');
        }

        async function saveCalibration() {
            const values = {};
            CALIB_GROUPS.forEach(key => {
                values[key] = {
                    a: parseFloat(document.getElementById(`calib-${key}-a`).value) || 0,
                    b: parseFloat(document.getElementById(`calib-${key}-b`).value) || 0,
                    c: parseFloat(document.getElementById(`calib-${key}-c`).value) || 0,
                };
            });
            try {
                const result = await pywebview.api.set_calibration(values);
                if (result.error) {
                    calibStatus.textContent = '保存エラー: ' + result.error;
                } else {
                    calibStatus.textContent = '保存しました';
                    renderCalibSummary(values);
                    setTimeout(closeCalibModal, 500);
                }
            } catch (e) {
                console.error('[saveCalibration] error:', e);
                calibStatus.textContent = '保存エラー';
            }
        }

        async function loadCalibSummary() {
            try {
                const values = await pywebview.api.get_calibration();
                renderCalibSummary(values);
            } catch (e) {
                console.error('[loadCalibSummary] error:', e);
            }
        }

        window.addEventListener('pywebviewready', function() {
            if (typeof pywebview === 'undefined' || typeof pywebview.api === 'undefined') {
                console.error('pywebview API is not available');
                updateStatus(false, 'API not available');
                return;
            }

            console.log('pywebview API is ready');

            startSaveBtn.addEventListener('click', () => { startSaving(); });
            stopSaveBtn.addEventListener('click', () => { stopSaving(); });
            calibBtn.addEventListener('click', () => { openCalibModal(); });
            editCalibBtn.addEventListener('click', () => { openCalibModal(); });
            closeCalibBtn.addEventListener('click', () => { closeCalibModal(); });
            saveCalibBtn.addEventListener('click', () => { saveCalibration(); });
            calibModal.addEventListener('click', (e) => {
                if (e.target === calibModal) closeCalibModal();
            });

            loadCalibSummary();
            fetchData();
            setInterval(fetchData, 500);
        });
    </script>
</body>
</html>
